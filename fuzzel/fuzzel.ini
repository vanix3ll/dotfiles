[main]
font=JetBrainsMono Nerd Font:size=7
prompt="❯ "
icon-theme=Papirus-Dark
lines=6
width=30
horizontal-pad=10
vertical-pad=6
inner-pad=6
line-height=13
fields=exec,name,generic
match-mode=fuzzy
show-actions=no
layer=overlay
terminal=foot
dpi-aware=yes

[colors]
background=0e0e0eff
text=ffffffff
match=8aadf4ff
selection=1a1a1aff
selection-text=8aadf4ff
border=222222ff

[border]
radius=8
width=1

[dmenu]
exit-immediately-if-empty=yes
